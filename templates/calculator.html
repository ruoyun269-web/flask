<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>次方與根號計算</title>
</head>
<body>
    <h2>次方與根號計算</h2>
    <form action="/calc" method="post">
        x: <input type="number" name="x" step="any" required><br><br>
        
        運算：
        <select name="op">
            <option value="pow">^ (次方)</option>
            <option value="root">√ (根號)</option>
        </select><br><br>
        
        y: <input type="number" name="y" step="any" required><br><br>
        
        <button type="submit">計算</button>
    </form>
    <br>
    <a href="/">返回首頁</a>
</body>
</html>
